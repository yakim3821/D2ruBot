services:
  postgres:
    image: postgres:16-alpine
    container_name: dota-forum-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DOTA2_FORUM_DB_NAME:-dota_forum_bot}
      POSTGRES_USER: ${DOTA2_FORUM_DB_USER:-dota_forum_bot}
      POSTGRES_PASSWORD: ${DOTA2_FORUM_DB_PASSWORD:-dota_forum_bot}
    ports:
      - "${DOTA2_FORUM_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOTA2_FORUM_DB_USER:-dota_forum_bot} -d ${DOTA2_FORUM_DB_NAME:-dota_forum_bot}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
